<div class="page">
  <header class="header">
    <h1>VB Art Shop</h1>
    <button class="btn-secondary" (click)="back()">← Voltar</button>
  </header>

  <main class="content">
    <h2>Obras de Arte</h2>

    <div *ngIf="loading" class="state">Carregando...</div>
    <div *ngIf="errorMessage" class="state error">{{ errorMessage }}</div>
    <div *ngIf="!loading && artworks.length === 0" class="state">Nenhuma obra cadastrada.</div>

    <table *ngIf="!loading && artworks.length > 0">
      <thead>
      <tr>
        <th>#</th>
        <th>Título</th>
        <th>Artista</th>
        <th>Preço</th>
        <th>Estoque</th>
        <th>Origem</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let a of artworks">
        <td>{{ a.id }}</td>
        <td>{{ a.title }}</td>
        <td>{{ a.artist }}</td>
        <td>{{ a.price | currency:'BRL' }}</td>
        <td>{{ a.stockQuantity }}</td>
        <td>{{ a.source }}</td>
      </tr>
      </tbody>
    </table>
  </main>
</div>
